name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: darwin
          - os: windows-latest
            platform: win32

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Package
        run: npx @electron/packager . NyaoVim --platform=${{ matrix.platform }} --arch=x64 --out=dist/ --overwrite

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NyaoVim-${{ matrix.platform }}-${{ github.ref_name }}
          path: dist/
